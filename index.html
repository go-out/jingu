<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />

    <title>Go Out | View the Collection</title>
    <meta content="JSONファイルを読み込み、コレクションを表示" name="description" />
    <link rel="icon" href="https://go-out.github.io/collection/icon/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://go-out.github.io/collection/fonts/style.css" />
    <link rel="stylesheet" href="https://go-out.github.io/collection/css/style.css" />
    <link rel="stylesheet" href="https://go-out.github.io/collection/css/events.css">
    <link rel="stylesheet" href="https://go-out.github.io/collection/css/list.css" />
    <link rel="stylesheet" href="https://go-out.github.io/collection/css/spot.css" />
    <link rel="stylesheet" href="https://go-out.github.io/collection/css/cover.css" />
    <link rel="stylesheet" href="https://go-out.github.io/mapbox/index.css" />

    <!-- Mapbox -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
    <script>
        mapboxgl.accessToken = "pk.eyJ1IjoicGVodSIsImEiOiJja3R4Y3diNmIybTg5Mm9waWgwYTdsc3FyIn0.lVvnPZ3aa6332EaWJIxPaQ";
    </script>
</head>

<body>
    <header>
        <h1 id="title">
            <strong>Go Out</strong>
            <u>行ったことのない場所へ行く</u>
        </h1>
        <ul id="cover" hidden></ul>
    </header>

    <dialog id="spot">
        <div>
            <button type="button" class="close">(閉じる)</button>
            <h2>
                <strong>Go Out</strong>
                <small id="year">YYYY</small>
            </h2>
            <h3>
                <strong id="month">MM</strong>
                <strong id="date">DD</strong>
            </h3>
            <canvas id="video" hidden></canvas>
            <nav id="vewAll"></nav>
        </div>
        <h4 id="thisDescription"></h4>
        <article id="info">
            <section hidden></section>
            <aside hidden>
                <u>関連ページ Related Pages</u>
            </aside>
        </article>
        <select name="log" id="log" hidden></select>
    </dialog>

    <dialog id="thisEvent">
        <button type="button" class="close">( 閉じる )</button>
        <article id="thisInfo"></article>
        <aside id="thisLink" hidden></aside>
    </dialog>

    <main id="collection">
        <section id="mapbox">
            <div id="map"></div>
        </section>
        <article>
            <h3 id="description"><b></b></h3>
            <div id="notes"></div>
            <aside id="links" hidden>
                <u>関連ページ Related Pages</u>
            </aside>
        </article>
    </main>

    <footer>
        <article id="events" hidden>
            <fieldset>
                <legend>四季の出来事</legend>
                <input type="radio" name="siki" id="spring">
                <label for="spring">
                    <strong>春</strong>
                    <small>March</small>
                    <small>April</small>
                    <small>May</small>
                </label>
                <input type="radio" name="siki" id="summer">
                <label for="summer">
                    <strong>夏</strong>
                    <small>June</small>
                    <small>July</small>
                    <small>August</small>
                </label>
                <input type="radio" name="siki" id="autumne">
                <label for="autumne">
                    <strong>秋</strong>
                    <small>September</small>
                    <small>October</small>
                    <small>November</small>
                </label>
                <input type="radio" name="siki" id="winter">
                <label for="winter">
                    <strong>冬</strong>
                    <small>December</small>
                    <small>January</small>
                    <small>February</small>
                </label>
                <input type="radio" name="siki" id="all">
                <label for="all">
                    <strong>毎月</strong>
                    <small>every month</small>
                </label>
            </fieldset>
        </article>

        <details id="index" hidden>
            <summary>コレクションを表示 | View the Collection</summary>
            <ul id="list"></ul>
            <div id="weather" hidden></div>
        </details>
    </footer>

    <script src="https://go-out.github.io/index.js"></script>
    <script src="https://go-out.github.io/mapbox/marker/script.js"></script>
    <script src="https://go-out.github.io/mapbox/line/script.js"></script>
    <script src="https://go-out.github.io/collection/js/script.js"></script>
    <script src="https://go-out.github.io/collection/js/weather.js"></script>
    <script>
        // collection/?id=ID&area=エリア&name=名前
        const params = new URLSearchParams(location.search);
        if (location.search) {
            let thisJson = "", thisID, thisArea, thisSpot;
            if (params.get("id")) {
                thisID = params.get("id").replace("-", "/");
                thisJson = `./${thisID}`;
            } else {
                thisJson = ".";
            };
            if (params.get("area")) {
                thisArea = params.get("area").replaceAll("-", '/');
                thisJson += `/${thisArea}`;
            };
            if (params.get("name")) {
                thisJson += `/${params.get("name")}.json`;
            } else {
                thisJson += "/index.json";
            };
            collectionJSON(thisJson);
        } else if (!location.search) {
            collectionJSON("index.json");
        };

        window.addEventListener("load", function () {
            const index = document.querySelector("#index");
            index.addEventListener("toggle", () => {
                if (index.open) {
                    index.scrollIntoView({
                        behavior: "smooth"
                    }, false);
                } else {
                    document.querySelector("#mapbox").scrollIntoView({
                        top: 0,
                        behavior: "smooth"
                    }, false);
                };
            }, false);
        }, false);
    </script>
</body>

</html>
